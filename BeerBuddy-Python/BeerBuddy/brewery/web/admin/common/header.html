  <script>
      // This sample requires the Places library. Include the libraries=places
      // parameter when you first load the API. For example:
      // <script
      // src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places">
      function initMap() {
        const map = new google.maps.Map(document.getElementById("map"), {
          center: { lat:  23.0229, lng: 72.5568 },
          zoom: 13,
        });
        const input = document.getElementById("place-map");
        // 
        var options = {
    fields: ["icon", "types", "rating", "formatted_address", "name", "reference","place_id", 
    "user_ratings_total", "business_status"],
  };

        // 
        const autocomplete = new google.maps.places.Autocomplete(input, options);
        autocomplete.bindTo("bounds", map);
      
        const infowindow = new google.maps.InfoWindow();
        
        const infowindowContent = document.getElementById("infowindow-content");
        infowindow.setContent(infowindowContent);

        const geocoder = new google.maps.Geocoder();
        const marker = new google.maps.Marker({ map: map });
        
        marker.addListener("click", () => {
          infowindow.open(map, marker);
        });
        autocomplete.addListener("place_changed", () => {
          infowindow.close();
          const place = autocomplete.getPlace();
          console.log(place);
          // let lat = place.geometry.location.lat();
          // let lng = place.geometry.location.lng();
          let placeid = place.place_id;
          let address = place.formatted_address;

          // Place Detail API call
          
          // end place detail 
          let placedata = JSON.stringify(place);


          // $("input[name='longitude']").val(lng);
          // $("input[name='langitude']").val(lat);
          $("input[name='placeid']").val(placeid);
          $("input[name='address']").val(address);
          $("input[name='placedata']").val(placedata);

         
          if (!place.place_id) {
            return;
          }
          geocoder.geocode({ placeId: place.place_id }, (results, status) => {
            if (status !== "OK" && results) {
              window.alert("Geocoder failed due to: " + status);
              return;
            }
            map.setZoom(11);
            map.setCenter(results[0].geometry.location);
            // Set the position of the marker using the place ID and location.
            marker.setPlace({
              placeId: place.place_id,
              location: results[0].geometry.location,
            });
            marker.setVisible(true);
            infowindowContent.children["place-name"].textContent = place.name;
            infowindowContent.children["place-id"].textContent = place.place_id;
            infowindowContent.children["place-address"].textContent =
              results[0].formatted_address;
            infowindow.open(map, marker);
          });
        });
      }
    </script>
