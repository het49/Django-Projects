{% include "users/web/admin/common/header.html" %}
{% load static %}
{% get_static_prefix as STATIC %}
<title>BeerBuddy:Sign In</title>
<div class="container">
    <div class="row">
        <div class="col-md-6 col-md-offset-3">
            <div class="login-panel panel panel-default">
                <div class="panel-heading">
                    <h3 class="panel-title">Sign In</h3>
                </div>
                <div class="panel-body">
                    <img src="{{STATIC}}assets/img/logo.png" class="img-responsive" alt=""/>


                    <form method="post" action="">
                        {% csrf_token %}
                        
                        <fieldset>
                            <div class="form-group col-md-12">
                                <input class="form-control" id="username" name="username" type="text"
                                       placeholder="Email">
                            </div>
                            <div class="form-group col-md-12">
                                <input class="form-control" id="password" name="password" type="password"
                                       placeholder="Password">
                            </div>
                            <div class="checkboxs col-md-12 text-center" style="margin: 5px 0;">
                                <span class="custom-checkbox">
                                <!--<label><input type="checkbox" id=id="checkbox1" name="remember">Remember Me</label>-->{{msg}}
                                </span>
                            </div>
                            <!-- Change this to a button or input when using this as a form -->
                            <button type="submit" class="btn btn-login">Sign In</button>
                        </fieldset>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>


</html>
